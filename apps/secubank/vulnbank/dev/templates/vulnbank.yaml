apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: vulnbank
    app.kubernetes.io/part-of: secure-k8s-delivery-path
    security-lab.openai.com/isolation: lab-only
    security-lab.openai.com/purpose: vulnerable-workload
  name: security-lab
---
apiVersion: v1
data:
  DB_HOST: vulnbank-postgres
  DB_NAME: vulnerable_bank
  DB_PORT: "5432"
  DB_USER: postgres
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: config
    app.kubernetes.io/name: vulnbank
  name: vulnbank-config
  namespace: security-lab
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/name: vulnbank
  name: vulnbank-postgres
  namespace: security-lab
spec:
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
  selector:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/name: vulnbank
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: vulnbank
  name: vulnbank-web
  namespace: security-lab
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: vulnbank
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/name: vulnbank
  name: vulnbank-postgres-data
  namespace: security-lab
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/name: vulnbank
  name: vulnbank-postgres
  namespace: security-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      app.kubernetes.io/name: vulnbank
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        app.kubernetes.io/name: vulnbank
    spec:
      containers:
      - env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              key: DB_NAME
              name: vulnbank-config
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              key: DB_USER
              name: vulnbank-config
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: vulnbank-secret
        image: postgres:13
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          initialDelaySeconds: 30
          periodSeconds: 10
          tcpSocket:
            port: postgres
          timeoutSeconds: 5
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -h 127.0.0.1 -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          failureThreshold: 6
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
          subPath: postgres-data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: vulnbank-postgres-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: vulnbank
  name: vulnbank-web
  namespace: security-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/name: vulnbank
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/name: vulnbank
    spec:
      containers:
      - env:
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              key: DB_NAME
              name: vulnbank-config
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              key: DB_USER
              name: vulnbank-config
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              key: DB_HOST
              name: vulnbank-config
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              key: DB_PORT
              name: vulnbank-config
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DB_PASSWORD
              name: vulnbank-secret
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              key: DEEPSEEK_API_KEY
              name: vulnbank-secret
              optional: true
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
        name: web
        ports:
        - containerPort: 5000
          name: http
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        volumeMounts:
        - mountPath: /app/static/uploads
          name: uploads
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - emptyDir: {}
        name: uploads
