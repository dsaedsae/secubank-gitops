apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secubank-myapp-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dsaedsae/secubank-gitops.git
    targetRevision: main
    path: apps/secubank/myapp/dev
    helm:
      releaseName: myapp
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: secubank-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
